version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: docuquery-db
    environment:
      POSTGRES_USER: docuquery_user
      POSTGRES_PASSWORD: docuquery_pass
      POSTGRES_DB: docuquery_db
    ports:
      - "5433:5432"
    volumes:
      - docuquery_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: docuquery-redis
    ports:
      - "6379:6379"

volumes:
  docuquery_pgdata:

