name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: docuquery_user
          POSTGRES_PASSWORD: docuquery_pass
          POSTGRES_DB: docuquery_test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://docuquery_user:docuquery_pass@localhost:5433/docuquery_test_db
      DATABASE_URL: postgresql://docuquery_user:docuquery_pass@localhost:5433/docuquery_test_db
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      GROQ_MODEL: openai/gpt-oss-20b
      APP_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run tests
        run: python -m pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t docuquery:ci .
